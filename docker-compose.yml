version: '3.8'

services:
  app:
    build: .
    container_name: chatty-app
    restart: unless-stopped
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-chatty-secret-key-change-in-production}
      - NODE_ENV=production
    volumes:
      - chatty-data:/app/backend
    networks:
      - chatty-network
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: chatty-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - chatty-network

  certbot:
    image: certbot/certbot
    container_name: chatty-certbot
    volumes:
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro

volumes:
  chatty-data:
  certbot-www:
  certbot-conf:

networks:
  chatty-network:
    driver: bridge
