version: '3.8'

services:
  app:
    build: .
    container_name: chatty-app
    restart: unless-stopped
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-chatty-secret-key-change-in-production}
      - NODE_ENV=production
    volumes:
      - chatty-data:/app/backend
    networks:
      - chatty-network
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: chatty-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - chatty-network

volumes:
  chatty-data:

networks:
  chatty-network:
    driver: bridge
